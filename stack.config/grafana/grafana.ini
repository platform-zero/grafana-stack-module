[auth.proxy]
enabled = true
header_name = X-WEBAUTH-USER
header_property = username
auto_sign_up = true
sync_ttl = 60
whitelist = caddy, 127.0.0.1, ::1
enable_login_token = false

[auth]
disable_login_form = true

[users]
allow_sign_up = true
auto_assign_org = true
auto_assign_org_role = Viewer
default_theme = dark

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/logs.json

[log]
level = info
filters = auth.proxy:info
